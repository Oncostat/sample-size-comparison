project:
  type: website
  output-dir: docs

website:
  announcement: 
    content: "**WIP** - this website is in progress, official release 12/03/2026" 
    position: below-navbar 
    type: warning
  page-footer:
    center: 
      - text: "About"
        href: about.qmd
  favicon: SCC-HexSticker.png
  open-graph: true
  # title: "SSC"
  navbar:
    logo: man\figures\SSC-banner.png
    background: primary
    search: true
    left:
      - text: "Book"
        href: index.qmd
      - text: "Interactive"
        href: interactive.qmd
      - text: "More"
        menu:
          - text: "Slides (french)"
            href: presentation/presentation-fr.qmd
            target: _blank
          - text: "About Exact test"
            href: bin2arms-exact.qmd
          - text: "Lakatos & Lan"
            href: lakatos_n_lan.qmd
      - text: "Code"
        href: "explain-code/code-home.qmd"
      - text: "About"
        href: about.qmd
    tools:
      - icon: globe
        href: https://oncostat.github.io/
      - icon: github
        menu:
          - text: Source Code
            href: https://github.com/Oncostat/sample-size-comparison
          - text: Report a Bug
            href: https://github.com/Oncostat/sample-size-comparison/issues/new
  sidebar:
    - title : "Book"
      # logo: SCC-HexSticker.png
      style: "docked"
      contents:
        - text: "Introduction"
          href: index.qmd
        - section: "Time-to-Event endpoints"
          href: surv/survival-endpoint.qmd
          contents:
            - surv/survival-methods.qmd
            - surv/survival-fixed.qmd
            - surv/survival-gs.qmd
            - surv/survival-one-arm.qmd
        - section: "Binary endpoints"
          href: bin/binary-endpoints.qmd
          contents:
            - bin/binary-methods.qmd
            - bin/binary-fixed.qmd
            - bin/binary-gs.qmd
            - bin/binary-one-arm.qmd
        - text: "References"
          href: references.qmd

format:
  html:
    highlight-style: github
    code-fold: show
    execute:
      echo: false
      warning: false
      message: false
    theme:
      light: flatly
      dark: darkly
      # - styles.scss
    toc: true
    css: styles.css
fig-format: svg
mermaid-format: svg




